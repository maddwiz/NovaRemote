openapi: 3.1.0
info:
  title: NovaRemote Cloud API
  version: 1.0.0
  description: Team auth, token brokerage, fleet governance, and audit metadata APIs for NovaRemote clients.
servers:
  - url: https://api.novaremote.dev
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      security: []
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    const: true
  /v1/auth/login:
    post:
      security: []
      summary: Password-based team sign-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Team identity and session tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
  /v1/auth/refresh:
    post:
      security: []
      summary: Refresh team auth session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Refreshed team identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
  /v1/auth/logout:
    post:
      security: []
      summary: Revoke team auth session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Team auth session revoked
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    const: true
  /v1/auth/sso/exchange:
    post:
      security: []
      summary: Exchange SSO token for team session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider]
              properties:
                provider:
                  type: string
                  enum: [saml, oidc]
                idToken:
                  type: string
                accessToken:
                  type: string
                inviteCode:
                  type: string
      responses:
        "200":
          description: Team identity and session tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
  /v1/tokens/provision:
    post:
      summary: Provision ephemeral companion token for a team server
      description: Requested `permissionLevel` is treated as a ceiling and clamped by caller role and server policy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serverId]
              properties:
                serverId:
                  type: string
                permissionLevel:
                  type: string
                  enum: [admin, operator, viewer]
      responses:
        "200":
          description: Ephemeral token and permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenProvisionResponse"
        "403":
          description: Caller lacks access to the requested server
        "404":
          description: Requested server was not found
  /v1/team/servers:
    get:
      summary: List team-managed servers visible to the user
      description: Response is filtered by team member server assignments unless the caller is an admin.
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
        - in: query
          name: vmHost
          required: false
          schema:
            type: string
        - in: query
          name: vmType
          required: false
          schema:
            type: string
        - in: query
          name: permissionLevel
          required: false
          schema:
            type: string
            enum: [admin, operator, viewer]
        - in: query
          name: search
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Team server list
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamServer"
    post:
      summary: Create a team-managed server entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamServerCreate"
      responses:
        "200":
          description: Team server created
          content:
            application/json:
              schema:
                type: object
                properties:
                  server:
                    $ref: "#/components/schemas/TeamServer"
  /v1/team/servers/{serverId}:
    patch:
      summary: Update a team-managed server entry
      parameters:
        - in: path
          name: serverId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamServerPatch"
      responses:
        "200":
          description: Team server updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  server:
                    $ref: "#/components/schemas/TeamServer"
    delete:
      summary: Remove a team-managed server entry
      parameters:
        - in: path
          name: serverId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team server removed
  /v1/team/members:
    get:
      summary: List team members and role metadata
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
        - in: query
          name: role
          required: false
          schema:
            type: string
            enum: [admin, operator, viewer, billing]
        - in: query
          name: email
          required: false
          schema:
            type: string
        - in: query
          name: activeSince
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Team member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamMember"
  /v1/team/members/{memberId}:
    patch:
      summary: Update member role
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, operator, viewer, billing]
      responses:
        "200":
          description: Member updated
  /v1/team/members/{memberId}/servers:
    put:
      summary: Update member server assignments
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serverIds]
              properties:
                serverIds:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Member server assignments updated
        "400":
          description: One or more serverIds are unknown
  /v1/team/settings:
    get:
      summary: Retrieve team policy settings
      responses:
        "200":
          description: Team settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: "#/components/schemas/TeamSettings"
    patch:
      summary: Update team policy settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamSettingsPatch"
      responses:
        "200":
          description: Team settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: "#/components/schemas/TeamSettings"
  /v1/team/settings/effective:
    get:
      summary: Retrieve effective team policy settings for the current member
      description: Returns the policy view that should be enforced by clients for this signed-in member.
      responses:
        "200":
          description: Effective team settings for the current member
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: "#/components/schemas/TeamSettings"
                  managedBy:
                    type: string
                    enum: [team_admin]
  /v1/team/usage:
    get:
      summary: Retrieve aggregate team usage counters
      responses:
        "200":
          description: Team usage
          content:
            application/json:
              schema:
                type: object
                properties:
                  usage:
                    $ref: "#/components/schemas/TeamUsage"
  /v1/team/invites:
    get:
      summary: List active and historical team invites
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, accepted, expired, revoked]
        - in: query
          name: role
          required: false
          schema:
            type: string
            enum: [admin, operator, viewer, billing]
        - in: query
          name: email
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Team invites
          content:
            application/json:
              schema:
                type: object
                properties:
                  invites:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamInvite"
    post:
      summary: Invite a new member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [admin, operator, viewer, billing]
      responses:
        "200":
          description: Invite created
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite:
                    $ref: "#/components/schemas/TeamInvite"
  /v1/team/invites/{inviteId}:
    delete:
      summary: Revoke a pending invite
      parameters:
        - in: path
          name: inviteId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite revoked
  /v1/team/sso/providers:
    get:
      summary: List team SSO provider configuration
      responses:
        "200":
          description: Team SSO provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamSsoProviderConfig"
  /v1/team/sso/providers/{provider}:
    patch:
      summary: Update team SSO provider configuration
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [saml, oidc]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                displayName:
                  type: string
                issuerUrl:
                  type: string
                authUrl:
                  type: string
                tokenUrl:
                  type: string
                clientId:
                  type: string
                callbackUrl:
                  type: string
      responses:
        "200":
          description: Team SSO provider updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    $ref: "#/components/schemas/TeamSsoProviderConfig"
  /v1/team/fleet/approvals:
    get:
      summary: List fleet approval records
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, approved, denied, expired]
        - in: query
          name: requestedBy
          required: false
          schema:
            type: string
        - in: query
          name: target
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Fleet approvals
          content:
            application/json:
              schema:
                type: object
                properties:
                  approvals:
                    type: array
                    items:
                      $ref: "#/components/schemas/FleetApproval"
    post:
      summary: Request fleet approval for command execution
      description: Targets are normalized to canonical team server IDs and validated against caller server access.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command, targets]
              properties:
                command:
                  type: string
                targets:
                  type: array
                  items:
                    type: string
                note:
                  type: string
      responses:
        "200":
          description: Fleet approval request
          content:
            application/json:
              schema:
                type: object
                properties:
                  approval:
                    $ref: "#/components/schemas/FleetApproval"
        "400":
          description: Invalid payload or unknown targets
        "403":
          description: Caller is not authorized for one or more targets
        "409":
          description: Duplicate pending approval request for the same requester/command/targets
  /v1/team/fleet/approvals/{approvalId}/approve:
    post:
      summary: Approve a fleet request
      parameters:
        - in: path
          name: approvalId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
      responses:
        "200":
          description: Fleet request approved
        "403":
          description: Self-approval blocked (review must come from another team member)
        "409":
          description: Approval is no longer pending (already resolved or expired)
  /v1/team/fleet/approvals/{approvalId}/deny:
    post:
      summary: Deny a fleet request
      parameters:
        - in: path
          name: approvalId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
      responses:
        "200":
          description: Fleet request denied
        "403":
          description: Self-review blocked (review must come from another team member)
        "409":
          description: Approval is no longer pending (already resolved or expired)
  /v1/team/fleet/approvals/{approvalId}/claim-execution:
    post:
      summary: Claim execution intent for an approved fleet request
      description: Claimer must still have access to every approval target at claim time.
      parameters:
        - in: path
          name: approvalId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fleet execution claim accepted
          content:
            application/json:
              schema:
                type: object
                required: [approval, executionToken]
                properties:
                  approval:
                    $ref: "#/components/schemas/FleetApproval"
                  executionToken:
                    type: string
                  executionExpiresAt:
                    type: string
        "403":
          description: Caller is not authorized for one or more approval targets
        "409":
          description: Approval is not eligible to claim (not approved, expired, already claimed, or targets unavailable)
  /v1/team/fleet/approvals/{approvalId}/complete:
    post:
      summary: Complete a claimed fleet execution
      description: Completes execution with the issued execution token; only the claimer or admin can finalize.
      parameters:
        - in: path
          name: approvalId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [executionToken]
              properties:
                executionToken:
                  type: string
                status:
                  type: string
                  enum: [succeeded, failed]
                summary:
                  type: string
      responses:
        "200":
          description: Fleet execution completion accepted
          content:
            application/json:
              schema:
                type: object
                required: [approval, ok]
                properties:
                  approval:
                    $ref: "#/components/schemas/FleetApproval"
                  ok:
                    type: boolean
                    const: true
        "400":
          description: Invalid completion payload
        "403":
          description: Invalid execution token or insufficient permission to complete
        "409":
          description: Approval is not eligible to complete (not claimed, already completed, expired, or targets unavailable)
  /v1/audit/events:
    get:
      summary: Query audit events
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
        - in: query
          name: action
          required: false
          schema:
            type: string
        - in: query
          name: serverId
          required: false
          schema:
            type: string
        - in: query
          name: session
          required: false
          schema:
            type: string
        - in: query
          name: user
          required: false
          schema:
            type: string
        - in: query
          name: approved
          required: false
          schema:
            type: boolean
        - in: query
          name: fromTimestamp
          required: false
          schema:
            type: integer
        - in: query
          name: toTimestamp
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
    post:
      summary: Ingest a batch of audit events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items:
                    $ref: "#/components/schemas/AuditEvent"
      responses:
        "200":
          description: Batch persisted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                  rejected:
                    type: integer
                  dropped:
                    type: integer
                    description: Number of oldest events dropped when the bounded audit queue exceeds 10,000 entries.
  /v1/audit/exports:
    get:
      summary: List cloud-hosted audit export jobs
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, ready, failed]
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [json, csv]
        - in: query
          name: requestedBy
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Export jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  exports:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditExportJob"
                  summary:
                    type: object
                    properties:
                      pending:
                        type: integer
                      ready:
                        type: integer
                      failed:
                        type: integer
    post:
      summary: Request a cloud-hosted audit export job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format]
              properties:
                format:
                  type: string
                  enum: [json, csv]
                rangeHours:
                  type: integer
                  minimum: 1
                  maximum: 720
      responses:
        "200":
          description: Export job prepared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditExportJob"
  /v1/audit/exports/{exportId}:
    get:
      summary: Get details for a cloud-hosted audit export job
      parameters:
        - in: path
          name: exportId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export job detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  export:
                    $ref: "#/components/schemas/AuditExportJob"
                  inScopeEventCount:
                    type: integer
    delete:
      summary: Delete a cloud-hosted audit export job
      parameters:
        - in: path
          name: exportId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export job removed
  /v1/audit/exports/{exportId}/retry:
    post:
      summary: Retry a failed cloud-hosted audit export job
      parameters:
        - in: path
          name: exportId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Export job retry queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  export:
                    $ref: "#/components/schemas/AuditExportJob"
  /v1/audit/exports/{exportId}/download:
    get:
      summary: Download a ready cloud-hosted audit export artifact
      parameters:
        - in: path
          name: exportId
          required: true
          schema:
            type: string
        - in: query
          name: token
          required: false
          description: Download token accepted when bearer auth is unavailable.
          schema:
            type: string
      security:
        - bearerAuth: []
        - auditExportToken: []
      responses:
        "200":
          description: Export artifact body
          content:
            application/json:
              schema:
                type: object
                properties:
                  exportId:
                    type: string
                  format:
                    type: string
                    enum: [json]
                  generatedAt:
                    type: string
                  rangeHours:
                    type: integer
                    nullable: true
                  eventCount:
                    type: integer
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEvent"
            text/csv:
              schema:
                type: string
                description: CSV payload containing audit event rows
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    auditExportToken:
      type: apiKey
      in: query
      name: token
      description: Download token accepted when bearer auth is unavailable.
  schemas:
    AuthEnvelope:
      type: object
      required: [identity]
      properties:
        identity:
          $ref: "#/components/schemas/TeamIdentity"
    LoginRequest:
      type: object
      required: [provider, email, password]
      properties:
        provider:
          type: string
          enum: [novaremote_cloud]
        email:
          type: string
          format: email
        password:
          type: string
        inviteCode:
          type: string
    TeamIdentity:
      type: object
      required:
        - provider
        - userId
        - email
        - displayName
        - teamId
        - teamName
        - role
        - permissions
        - accessToken
        - refreshToken
        - tokenExpiresAt
      properties:
        provider:
          type: string
          enum: [novaremote_cloud, saml, oidc, ldap_proxy]
        userId:
          type: string
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
        teamId:
          type: string
        teamName:
          type: string
        role:
          type: string
          enum: [admin, operator, viewer, billing]
        permissions:
          type: array
          items:
            type: string
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenExpiresAt:
          type: integer
    TokenProvisionResponse:
      type: object
      required: [serverId, token, expiresAt, permissions, permissionLevel]
      properties:
        serverId:
          type: string
        token:
          type: string
        expiresAt:
          type: integer
        permissions:
          type: array
          items:
            type: string
            enum: [read, write, execute, admin]
        permissionLevel:
          type: string
          enum: [admin, operator, viewer]
    TeamServer:
      type: object
      required: [id, name, baseUrl, defaultCwd, permissionLevel]
      properties:
        id:
          type: string
        teamServerId:
          type: string
        name:
          type: string
        baseUrl:
          type: string
        token:
          type: string
        defaultCwd:
          type: string
        permissionLevel:
          type: string
          enum: [admin, operator, viewer]
        vmHost:
          type: string
        vmType:
          type: string
        vmName:
          type: string
        vmId:
          type: string
    TeamServerCreate:
      type: object
      required: [name, baseUrl]
      properties:
        name:
          type: string
        baseUrl:
          type: string
        defaultCwd:
          type: string
        permissionLevel:
          type: string
          enum: [admin, operator, viewer]
        vmHost:
          type: string
        vmType:
          type: string
        vmName:
          type: string
        vmId:
          type: string
    TeamServerPatch:
      type: object
      properties:
        name:
          type: string
        baseUrl:
          type: string
        defaultCwd:
          type: string
        permissionLevel:
          type: string
          enum: [admin, operator, viewer]
        vmHost:
          type: string
        vmType:
          type: string
        vmName:
          type: string
        vmId:
          type: string
    TeamMember:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, operator, viewer, billing]
        serverIds:
          type: array
          items:
            type: string
        sessionsCreated:
          type: integer
        commandsSent:
