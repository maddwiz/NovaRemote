name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Verify cloud scaffold bootstrap
        run: npm run cloud:verify-bootstrap

      - name: Verify VR scaffold bootstrap
        run: npm run vr:verify-bootstrap

      - name: Expo doctor
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Expo doctor attempt ${attempt}/3"
            if npm run doctor; then
              exit 0
            fi
            if [[ "${attempt}" -eq 3 ]]; then
              echo "Expo doctor failed after 3 attempts."
              exit 1
            fi
            echo "Retrying Expo doctor in 5 seconds..."
            sleep 5
          done
